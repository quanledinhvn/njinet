<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Njinet — Spatial Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #08090f;
      --surface:   #10131a;
      --card:      #1c2026;
      --border:    #2a2f3a;
      --primary:   #aac7ff;
      --primary-2: #1275e2;
      --cyan:      #22d3ee;
      --teal:      #2dd4bf;
      --rose:      #fb7185;
      --amber:     #fbbf24;
      --text:      #e0e2eb;
      --muted:     #8b919f;
      --mono:      'Space Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── CANVAS ── */
    #canvas {
      position: fixed; inset: 0;
      z-index: 0;
    }

    /* ── HERO SECTION ── */
    .hero {
      position: relative; z-index: 10;
      width: 100%; height: 100dvh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr auto;
      padding: 2.5rem 3rem;
      gap: 0;
    }

    /* NAV */
    .nav {
      grid-column: 1 / -1;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0;
    }
    .nav-logo {
      font-family: var(--mono);
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--primary);
      display: flex; align-items: center; gap: 0.5rem;
    }
    .nav-logo::before {
      content: '';
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 10px var(--cyan);
      animation: blink 2s ease-in-out infinite;
    }
    .nav-link {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.25rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 100px;
      background: rgba(255,255,255,0.03);
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .nav-link:hover {
      color: var(--primary);
      border-color: var(--primary);
      background: rgba(170,199,255,0.06);
    }
    .nav-link svg {
      width: 11px; height: 11px;
      opacity: 0.7;
      transition: opacity 0.2s, transform 0.2s;
    }
    .nav-link:hover svg {
      opacity: 1;
      transform: translateX(2px);
    }

    .nav-status {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      display: flex; align-items: center; gap: 1.5rem;
    }
    .status-pill {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.25rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 100px;
      background: rgba(255,255,255,0.03);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #34d399;
      box-shadow: 0 0 8px #34d399;
      animation: blink 1.6s ease-in-out infinite;
    }

    /* MAIN CONTENT */
    .main {
      grid-column: 1 / 2;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding-right: 3rem;
    }

    .eyebrow {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.3s forwards;
    }

    .headline {
      font-family: var(--sans);
      font-size: clamp(3rem, 5.5vw, 5.5rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.03em;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.5s forwards;
    }
    .headline em {
      font-style: normal;
      color: transparent;
      -webkit-text-stroke: 1.5px var(--primary);
      display: block;
    }

    .body-text {
      font-family: 'Inter', sans-serif;
      font-size: 1.05rem;
      font-weight: 400;
      line-height: 1.7;
      color: var(--muted);
      max-width: 38ch;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.7s forwards;
    }
    .btn-try-now {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-family: var(--mono);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #08090f;
      background: var(--primary);
      padding: 0.75rem 1.6rem;
      border-radius: 100px;
      text-decoration: none;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.85s forwards;
      box-shadow: 0 0 24px rgba(170,199,255,0.25), 0 2px 8px rgba(0,0,0,0.4);
      transition: box-shadow 0.25s, transform 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn-try-now::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, rgba(255,255,255,0.18) 0%, transparent 60%);
      border-radius: inherit;
      pointer-events: none;
    }
    .btn-try-now:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 40px rgba(170,199,255,0.45), 0 6px 20px rgba(0,0,0,0.5);
      background: #c4d8ff;
    }
    .btn-try-now:active {
      transform: translateY(0);
    }
    .btn-try-now svg {
      width: 13px; height: 13px;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .btn-try-now:hover svg {
      transform: translate(2px, -2px);
    }

    .actions {
      display: flex; align-items: center; gap: 1rem;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.9s forwards;
    }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 0.6rem;
      padding: 0.85rem 2rem;
      border-radius: 100px;
      background: var(--primary-2);
      color: #fff;
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      border: none; cursor: pointer;
      box-shadow: 0 0 30px rgba(18, 117, 226, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 50px rgba(18, 117, 226, 0.6);
    }
    .btn-primary svg { width: 16px; height: 16px; }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.85rem 1.75rem;
      border-radius: 100px;
      background: transparent;
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      text-decoration: none;
    }
    .btn-secondary:hover {
      border-color: var(--primary);
      background: rgba(170, 199, 255, 0.06);
    }

    /* STAT ROW */
    .stats {
      grid-column: 1 / 2;
      display: flex; gap: 2.5rem;
      align-items: flex-end;
      padding-top: 2rem;
      opacity: 0;
      animation: fadeUp 0.7s ease 1.1s forwards;
    }
    .stat-item { display: flex; flex-direction: column; gap: 0.2rem; }
    .stat-value {
      font-family: var(--mono);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }
    .stat-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .stat-divider {
      width: 1px;
      height: 2rem;
      background: var(--border);
      margin-bottom: 0.25rem;
    }

    /* RIGHT PANEL — DEMO CANVAS */
    .demo-panel {
      grid-column: 2 / 3;
      grid-row: 2 / 4;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      animation: fadeIn 1s ease 0.6s forwards;
    }

    .demo-frame {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* frame chrome */
    .demo-chrome {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
    }
    .chrome-dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .chrome-title {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-left: auto; margin-right: auto;
      text-transform: uppercase;
    }
    .demo-title {
      position: absolute;
      top: 0.9rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.08);
      pointer-events: none;
    }

    /* demo canvas */
    .demo-nodes {
      position: relative;
      width: 100%; height: 100%;
      overflow: hidden;
    }
    #demo-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }

    /* DECORATIVE EDGE LINES */
    .edge-line {
      position: fixed;
      background: linear-gradient(to bottom, transparent, var(--border), transparent);
      width: 1px;
      top: 0; bottom: 0;
      pointer-events: none; z-index: 5;
    }
    .edge-line.left  { left: 3rem; }
    .edge-line.right { right: 3rem; }


    /* BACKGROUND GLOW BLOBS */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none; z-index: 1;
      animation: drift var(--dur, 20s) ease-in-out infinite alternate;
    }
    .blob-1 {
      width: 600px; height: 600px;
      top: -150px; right: 10%;
      background: radial-gradient(ellipse, rgba(18,117,226,0.15) 0%, transparent 70%);
      --dur: 18s;
    }
    .blob-2 {
      width: 400px; height: 400px;
      bottom: 5%; left: 5%;
      background: radial-gradient(ellipse, rgba(34,211,238,0.1) 0%, transparent 70%);
      --dur: 22s;
    }
    .blob-3 {
      width: 300px; height: 300px;
      top: 30%; left: 45%;
      background: radial-gradient(ellipse, rgba(170,199,255,0.06) 0%, transparent 70%);
      --dur: 14s;
    }

    /* ── KEYFRAMES ── */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.1); }
    }
    @keyframes pulse-ring {
      0%   { transform: scale(0.8); opacity: 0.8; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    /* responsive */
    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto auto;
        padding: 2rem;
      }
      .demo-panel {
        grid-column: 1 / -1;
        grid-row: 3 / 4;
        padding-top: 2rem;
        height: 90vw;
        min-height: 340px;
        max-height: 520px;
      }
      .stats { grid-column: 1 / -1; }
      .main { padding-right: 0; grid-row: 2 / 3; }
      .headline { font-size: clamp(2.5rem, 10vw, 4rem); }
      .edge-line { display: none; }
    }

    /* allow scrolling on short viewports */
    @media (max-height: 720px) {
      html, body {
        overflow-x: hidden;
        overflow-y: auto;
      }
      .hero {
        height: auto;
        min-height: 100dvh;
      }
    }
  </style>
</head>
<body>

  <!-- Blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Vertical edge lines -->
  <div class="edge-line left"></div>
  <div class="edge-line right"></div>

  <!-- Stars canvas -->
  <canvas id="canvas"></canvas>

  <!-- ── HERO ── -->
  <section class="hero">

    <!-- NAV -->
    <nav class="nav">
      <div class="nav-logo">njinet</div>
      <div class="nav-status">
        <a href="architect.html" class="nav-link">
          architect
          <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 10L10 2M10 2H4M10 2V8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>
    </nav>

    <!-- MAIN COPY -->
    <div class="main">
      <p class="eyebrow">Chat Graph</p>

      <h1 class="headline">
        Chat in<br>
        <em>graphs,</em>
        not threads.
      </h1>

      <p class="body-text">
        A shared space where conversations form naturally.
      </p>
      <a href="https://app.njinet.site" class="btn-try-now" target="_blank" rel="noopener noreferrer">
        Try now
        <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 10L10 2M10 2H4M10 2V8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

    <!-- STATS removed (minimal copy) -->

    <!-- DEMO PANEL -->
    <div class="demo-panel demo-pane">
      <div class="demo-frame">


        <div class="demo-nodes" id="demo-nodes" aria-label="chat graph demo">
          <canvas id="demo-canvas"></canvas>
        </div>
      </div>
    </div>

  </section>

  <script>
    // ── STARS ──────────────────────────────────────────────────
    (function() {
      const c = document.getElementById('canvas');
      const ctx = c.getContext('2d');
      let W, H, stars = [];

      function resize() {
        W = c.width  = window.innerWidth;
        H = c.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      function mkStar() {
        return {
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 0.8 + 0.2,
          a: Math.random(),
          da: (Math.random() * 0.003 + 0.001) * (Math.random() < 0.5 ? 1 : -1),
        };
      }
      for (let i = 0; i < 220; i++) stars.push(mkStar());

      function frame() {
        ctx.clearRect(0, 0, W, H);
        for (const s of stars) {
          s.a = Math.max(0.05, Math.min(1, s.a + s.da));
          if (s.a <= 0.05 || s.a >= 1) s.da *= -1;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(170,199,255,${s.a * 0.6})`;
          ctx.fill();
        }
        requestAnimationFrame(frame);
      }
      frame();
    })();

    // ── DEMO GRAPH (Canvas physics + cinematic sequence) ────────
    (function() {
      const wrapper = document.getElementById('demo-nodes');
      const cv = document.getElementById('demo-canvas');
      const ctx = cv.getContext('2d');

      const COLORS = ['#22d3ee','#aac7ff','#fb7185','#2dd4bf','#fbbf24','#a78bfa'];
      const NAMES  = ['alex','mia','kai','jun','sol','ren'];
      const INITIALS = NAMES.map(n => n.slice(0,2).toUpperCase());

      // ── Resize ──────────────────────────────────────────────
      let W, H;
      function resize() {
        const r = wrapper.getBoundingClientRect();
        W = cv.width  = r.width  * devicePixelRatio;
        H = cv.height = r.height * devicePixelRatio;
        cv.style.width  = r.width  + 'px';
        cv.style.height = r.height + 'px';
        ctx.scale(devicePixelRatio, devicePixelRatio);
      }
      resize();
      window.addEventListener('resize', () => { ctx.resetTransform(); resize(); scatterNodes(); });

      const w = () => cv.width  / devicePixelRatio;
      const h = () => cv.height / devicePixelRatio;

      // ── Nodes ───────────────────────────────────────────────
      // Store normalized positions (0..1), resolved to px in physics/draw
      // so resize always works correctly
      const nodes = NAMES.map((name, i) => ({
        id: i, name, color: COLORS[i], initials: INITIALS[i],
        x: -1, y: -1, // set after first resize
        vx: 0, vy: 0,
        radius: i === 0 ? 26 : 20,
        pulseT: 0,
        alpha: 0,
        bubble: null,
      }));

      function scatterNodes() {
        nodes.forEach(n => {
          n.x = w() * 0.15 + Math.random() * w() * 0.7;
          n.y = h() * 0.15 + Math.random() * h() * 0.7;
          // random kick breaks physics symmetry so nodes don't form columns
          n.vx = (Math.random() - 0.5) * 4;
          n.vy = (Math.random() - 0.5) * 4;
        });
      }

      // edges: who is connected to whom
      const edges = [
        [0,1],[0,2],[0,3],[1,2],[2,4],[3,5],[4,5],[1,5]
      ];

      // ── Cinematic sequence ───────────────────────────────────
      // Each act: { delay ms, run: fn }
      const ACTS = [
        // Act 0 — nodes fade in (handled by alpha ramp)
        // Act 1 — alex says something
        { delay: 1800, run: () => sendMsg(0, 'hey all 👋') },
        // Act 2 — mia replies
        { delay: 3200, run: () => { pulse(1); sendMsg(1, 'yo!') } },
        // Act 3 — kai pulses + message flows along edge 0→2
        { delay: 4600, run: () => { pulse(2); sendMsg(2, 'in the graph') } },
        // Act 4 — packet travels 0→3
        { delay: 5800, run: () => { firePacket(0, 3); sendMsg(3, 'nice 👌') } },
        // Act 5 — new node joins (sol lights up)
        { delay: 7200, run: () => { pulse(4); sendMsg(4, 'joining...') } },
        // Act 6 — chain reaction: packet 4→5 + 5→0
        { delay: 8400, run: () => { firePacket(4, 5); firePacket(5, 0); } },
        // Act 7 — quiet, then loop
        { delay: 10500, run: () => restartSequence() },
      ];

      let actTimer = null;
      function scheduleActs() {
        ACTS.forEach(act => {
          const t = setTimeout(act.run, act.delay);
          actTimers.push(t);
        });
      }
      const actTimers = [];
      function restartSequence() {
        actTimers.forEach(clearTimeout);
        actTimers.length = 0;
        nodes.forEach(n => { n.bubble = null; });
        scheduleActs();
      }

      function sendMsg(id, text) {
        nodes[id].bubble = { text, life: 1 };
        nodes[id].pulseT = 1;
      }
      function pulse(id) {
        nodes[id].pulseT = 1;
      }

      // ── Packets ─────────────────────────────────────────────
      const packets = [];
      function firePacket(from, to) {
        packets.push({ from, to, t: 0, col: nodes[from].color });
      }

      // ── Physics ──────────────────────────────────────────────
      const REPEL  = 3500;
      const DAMP   = 0.78;
      const CENTER = 0.004;
      const NOISE  = 0.04; // per-frame random drift to break symmetry

      function physics() {
        const cx = w() / 2, cy = h() / 2;
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const na = nodes[i], nb = nodes[j];
            const dx = nb.x - na.x, dy = nb.y - na.y;
            const dist2 = dx*dx + dy*dy || 1;
            const f = REPEL / dist2;
            const dist = Math.sqrt(dist2);
            const fx = (dx / dist) * f;
            const fy = (dy / dist) * f;
            na.vx -= fx; na.vy -= fy;
            nb.vx += fx; nb.vy += fy;
          }
        }
        for (const n of nodes) {
          // continuous noise prevents stable symmetric equilibrium
          n.vx += (Math.random() - 0.5) * NOISE;
          n.vy += (Math.random() - 0.5) * NOISE;
          n.vx += (cx - n.x) * CENTER;
          n.vy += (cy - n.y) * CENTER;
          n.vx *= DAMP; n.vy *= DAMP;
          n.x  += n.vx; n.y  += n.vy;
          const pad = n.radius + 32;
          n.x = Math.max(pad, Math.min(w() - pad, n.x));
          n.y = Math.max(pad, Math.min(h() - pad, n.y));
        }
      }

      // ── Draw helpers ─────────────────────────────────────────
      function hexAlpha(hex, a) {
        const r = parseInt(hex.slice(1,3),16);
        const g = parseInt(hex.slice(3,5),16);
        const b = parseInt(hex.slice(5,7),16);
        return `rgba(${r},${g},${b},${a})`;
      }


      function drawNode(n) {
        const a = n.alpha;
        if (a <= 0) return;

        // pulse ring
        if (n.pulseT > 0) {
          const pr = n.radius + (1 - n.pulseT) * 28;
          ctx.beginPath();
          ctx.arc(n.x, n.y, pr, 0, Math.PI * 2);
          ctx.strokeStyle = hexAlpha(n.color, n.pulseT * 0.55 * a);
          ctx.lineWidth = 1.5;
          ctx.stroke();
          n.pulseT = Math.max(0, n.pulseT - 0.022);
        }

        // glow
        const grd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.radius * 2.5);
        grd.addColorStop(0, hexAlpha(n.color, 0.18 * a));
        grd.addColorStop(1, hexAlpha(n.color, 0));
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.radius * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        // circle fill
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
        ctx.fillStyle = hexAlpha('#10131a', a);
        ctx.fill();

        // border
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
        ctx.strokeStyle = hexAlpha(n.color, a);
        ctx.lineWidth = 2;
        ctx.stroke();

        // initials
        ctx.fillStyle = hexAlpha(n.color, a);
        ctx.font = `700 ${n.radius * 0.5}px 'Space Mono', monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(n.initials, n.x, n.y);

        // name label below
        const lw = ctx.measureText(n.name).width + 14;
        const lh = 16, lx = n.x - lw/2, ly = n.y + n.radius + 7;
        ctx.beginPath();
        ctx.roundRect(lx, ly, lw, lh, 8);
        ctx.fillStyle = hexAlpha('#1c2026', 0.92 * a);
        ctx.fill();
        ctx.strokeStyle = hexAlpha('#2a2f3a', a * 0.6);
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.fillStyle = hexAlpha('#8b919f', a);
        ctx.font = `400 9px 'Space Mono', monospace`;
        ctx.fillText(n.name, n.x, ly + lh / 2 + 0.5);
      }

      function drawBubble(n) {
        if (!n.bubble || n.alpha <= 0) return;
        const b = n.bubble;
        const a = b.life * n.alpha;
        const text = b.text;
        ctx.font = `400 9.5px 'Space Mono', monospace`;
        const tw = ctx.measureText(text).width;
        const bw = tw + 20, bh = 24;
        const bx = n.x - bw / 2;
        const by = n.y - n.radius - bh - 10;

        // box
        ctx.beginPath();
        ctx.roundRect(bx, by, bw, bh, 6);
        ctx.fillStyle = hexAlpha('#1c2026', 0.95 * a);
        ctx.fill();
        ctx.strokeStyle = hexAlpha('#2a2f3a', a);
        ctx.lineWidth = 1;
        ctx.stroke();

        // tail
        ctx.beginPath();
        ctx.moveTo(n.x - 5, by + bh);
        ctx.lineTo(n.x + 5, by + bh);
        ctx.lineTo(n.x,     by + bh + 6);
        ctx.closePath();
        ctx.fillStyle = hexAlpha('#2a2f3a', a * 0.8);
        ctx.fill();

        // text
        ctx.fillStyle = hexAlpha('#e0e2eb', a);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, n.x, by + bh / 2 + 0.5);

        // fade bubble
        b.life = Math.max(0, b.life - 0.004);
        if (b.life <= 0) n.bubble = null;
      }

      function drawPacket(p) {
        const na = nodes[p.from], nb = nodes[p.to];
        const x = na.x + (nb.x - na.x) * p.t;
        const y = na.y + (nb.y - na.y) * p.t;

        // trail
        for (let i = 1; i <= 6; i++) {
          const tt = Math.max(0, p.t - i * 0.04);
          const tx = na.x + (nb.x - na.x) * tt;
          const ty = na.y + (nb.y - na.y) * tt;
          ctx.beginPath();
          ctx.arc(tx, ty, 2.5 * (1 - i/7), 0, Math.PI * 2);
          ctx.fillStyle = hexAlpha(p.col, (1 - i/7) * 0.35);
          ctx.fill();
        }

        // dot
        ctx.beginPath();
        ctx.arc(x, y, 3.5, 0, Math.PI * 2);
        ctx.fillStyle = hexAlpha(p.col, 0.95);
        ctx.fill();

        // glow
        const grd = ctx.createRadialGradient(x, y, 0, x, y, 10);
        grd.addColorStop(0, hexAlpha(p.col, 0.5));
        grd.addColorStop(1, hexAlpha(p.col, 0));
        ctx.beginPath();
        ctx.arc(x, y, 10, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        p.t += 0.025;
      }

      // ── Grid overlay ─────────────────────────────────────────
      function drawGrid() {
        const step = 32;
        ctx.strokeStyle = 'rgba(170,199,255,0.04)';
        ctx.lineWidth = 1;
        for (let x = 0; x < w(); x += step) {
          ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h()); ctx.stroke();
        }
        for (let y = 0; y < h(); y += step) {
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w(), y); ctx.stroke();
        }
      }

      // ── Main loop ────────────────────────────────────────────
      let t0 = null;
      function frame(ts) {
        if (!t0) t0 = ts;
        const elapsed = ts - t0;

        ctx.clearRect(0, 0, w(), h());

        // grid
        drawGrid();

        // ramp alpha
        nodes.forEach((n, i) => {
          const target = 1;
          const start  = i * 300 + 400;
          n.alpha = Math.min(target, Math.max(0, (elapsed - start) / 600));
        });

        physics();

        // packets
        for (let i = packets.length - 1; i >= 0; i--) {
          drawPacket(packets[i]);
          if (packets[i].t >= 1) {
            pulse(packets[i].to);
            packets.splice(i, 1);
          }
        }

        // nodes + bubbles
        for (const n of nodes) {
          drawNode(n);
          drawBubble(n);
        }

        // scan line
        const scanY = ((elapsed * 0.04) % (h() + 40)) - 20;
        const sg = ctx.createLinearGradient(0, scanY - 2, 0, scanY + 2);
        sg.addColorStop(0, 'transparent');
        sg.addColorStop(0.5, 'rgba(170,199,255,0.08)');
        sg.addColorStop(1, 'transparent');
        ctx.fillStyle = sg;
        ctx.fillRect(0, scanY - 2, w(), 4);

        requestAnimationFrame(frame);
      }

      // Wait 2 rAF frames so mobile layout has settled before scattering
      requestAnimationFrame(() => requestAnimationFrame(() => {
        resize();
        scatterNodes();
        scheduleActs();
        requestAnimationFrame(frame);
      }));
    })();
  </script>
</body>
</html>
